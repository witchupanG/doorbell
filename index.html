<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>กริ่งประตู (เครื่อง A)</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif; background: #111; color: #eee;
         display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  header { padding: 10px 14px; background: #1c1c1c; display: flex; align-items: center; gap: 8px; }
  header h1 { font-size: 16px; margin: 0; flex: 1; }
  #gear { background: none; border: none; color: #aaa; font-size: 22px; cursor: pointer; }
  #wrap { flex: 1; position: relative; background: #000; }
  video { width: 100%; height: 100%; object-fit: cover; }
  #ring { position: absolute; left: 50%; bottom: 28px; transform: translateX(-50%);
          width: 130px; height: 130px; border-radius: 50%; border: none; cursor: pointer;
          background: #e53935; color: #fff; font-size: 19px; font-weight: bold;
          box-shadow: 0 6px 20px rgba(0,0,0,.5); transition: transform .08s, background .2s; }
  #ring:active { transform: translateX(-50%) scale(.93); }
  #ring:disabled { background: #777; }
  #flip { position: absolute; right: 16px; bottom: 60px; width: 52px; height: 52px; border-radius: 50%;
          background: rgba(0,0,0,.55); border: 1px solid #555; color: #fff; font-size: 22px; cursor: pointer; }
  #toast { position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
           background: rgba(0,0,0,.8); padding: 8px 16px; border-radius: 20px; font-size: 14px;
           opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; }
  #settings { position: absolute; inset: 0; background: #1a1a1a; padding: 18px; display: none;
              overflow: auto; z-index: 5; }
  #settings.show { display: block; }
  #settings label { display: block; margin: 14px 0 4px; font-size: 14px; color: #bbb; }
  #settings input, #settings select { width: 100%; padding: 10px; border-radius: 8px;
            border: 1px solid #444; background: #262626; color: #fff; font-size: 15px; }
  .row { display: flex; gap: 10px; margin-top: 20px; }
  .row button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; }
  #save { background: #2e7d32; color: #fff; } #close { background: #444; color: #fff; }
  .hint { font-size: 12px; color: #888; margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>
<header>
  <h1>🔔 กริ่งประตู — เครื่อง A</h1>
  <button id="gear" title="ตั้งค่า">⚙️</button>
</header>

<div id="wrap">
  <video id="cam" autoplay playsinline muted></video>
  <button id="flip" title="สลับกล้อง">🔄</button>
  <button id="ring">กดกริ่ง</button>
  <div id="toast"></div>
</div>

<div id="settings">
  <h2 style="margin-top:0;font-size:18px;">ตั้งค่า</h2>
  <label>เซิร์ฟเวอร์ ntfy</label>
  <input id="server" value="https://ntfy.sh">
  <label>ชื่อ Topic (ช่องลับ — ตั้งให้เดายาก)</label>
  <input id="topic" placeholder="เช่น bell-baan-x7k9q2">
  <label>ข้อความแจ้งเตือน</label>
  <input id="title" value="มีคนกดกริ่งหน้าประตู">
  <label>ความดัง/ความสำคัญ</label>
  <select id="priority">
    <option value="urgent">เด่นสุด (urgent)</option>
    <option value="high" selected>สูง (high)</option>
    <option value="default">ปกติ</option>
  </select>
  <div class="hint">
    • เครื่อง B: ลงแอป <b>ntfy</b> แล้ว Subscribe topic ชื่อเดียวกันนี้<br>
    • Topic เป็นช่องสาธารณะ ใครรู้ชื่อก็เห็นได้ → ตั้งชื่อให้เดายาก<br>
    • รูปจะถูกส่งผ่านเซิร์ฟเวอร์ ntfy (เก็บชั่วคราว)
  </div>
  <div class="row">
    <button id="close">ปิด</button>
    <button id="save">บันทึก</button>
  </div>
</div>

<canvas id="cv" hidden></canvas>
<script>
const $ = id => document.getElementById(id);
const cfg = JSON.parse(localStorage.getItem("doorbell") || "{}");
let facing = cfg.facing || "user";   // user = กล้องหน้า, environment = กล้องหลัง
let stream = null;

// โหลดค่าที่บันทึกไว้
// ไม่ฝัง topic ลับในหน้าที่ host แบบ public — กรอกเองครั้งเดียวผ่าน ⚙️ (เก็บในเครื่อง)
$("server").value = cfg.server || "https://ntfy.sh";
$("topic").value  = cfg.topic  || "";
$("title").value  = cfg.title  || "มีคนกดกริ่งหน้าประตู";
$("priority").value = cfg.priority || "high";

function toast(msg, ms = 2200) {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), ms);
}

async function startCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facing }, audio: false });
    $("cam").srcObject = stream;
  } catch (e) {
    toast("เปิดกล้องไม่ได้: " + e.message, 4000);
  }
}

$("flip").onclick = () => {
  facing = facing === "user" ? "environment" : "user";
  const c = JSON.parse(localStorage.getItem("doorbell") || "{}");
  c.facing = facing; localStorage.setItem("doorbell", JSON.stringify(c));
  startCamera();
};

$("gear").onclick = () => $("settings").classList.add("show");
$("close").onclick = () => $("settings").classList.remove("show");
$("save").onclick = () => {
  const c = { server: $("server").value.trim().replace(/\/+$/, ""),
              topic: $("topic").value.trim(), title: $("title").value.trim(),
              priority: $("priority").value, facing };
  localStorage.setItem("doorbell", JSON.stringify(c));
  $("settings").classList.remove("show");
  toast("บันทึกแล้ว");
};

function grabPhoto() {
  const v = $("cam"), cv = $("cv");
  cv.width = v.videoWidth || 640; cv.height = v.videoHeight || 480;
  cv.getContext("2d").drawImage(v, 0, 0, cv.width, cv.height);
  return new Promise(res => cv.toBlob(res, "image/jpeg", 0.8));
}

$("ring").onclick = async () => {
  const c = JSON.parse(localStorage.getItem("doorbell") || "{}");
  if (!c.topic) { toast("ยังไม่ได้ตั้ง Topic — กด ⚙️ ก่อน", 3000);
                  $("settings").classList.add("show"); return; }
  const btn = $("ring"); btn.disabled = true; btn.textContent = "กำลังส่ง…";
  try {
    const blob = await grabPhoto();
    const res = await fetch(`${c.server || "https://ntfy.sh"}/${c.topic}`, {
      method: "PUT",
      headers: {
        "Title": c.title || "มีคนกดกริ่งหน้าประตู",
        "Priority": c.priority || "high",
        "Tags": "bell",
        "Filename": "door.jpg"
      },
      body: blob
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    toast("ส่งแล้ว ✓ (เครื่อง B ควรดังแล้ว)");
  } catch (e) {
    toast("ส่งไม่สำเร็จ: " + e.message, 4000);
  } finally {
    btn.disabled = false; btn.textContent = "กดกริ่ง";
  }
};

startCamera();
</script>
</body>
</html>
